<svg viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect width="1000" height="260" fill="url(#bg)"/>

  <!-- Working Directory -->
  <rect x="30" y="80" width="190" height="100" rx="14" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="125" y="120" fill="#58a6ff" font-size="16" font-family="Verdana" text-anchor="middle" font-weight="bold">Working</text>
  <text x="125" y="140" fill="#58a6ff" font-size="16" font-family="Verdana" text-anchor="middle" font-weight="bold">Directory</text>
  <text x="125" y="165" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">Edit files</text>

  <!-- Staging Area -->
  <rect x="270" y="80" width="190" height="100" rx="14" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="365" y="120" fill="#3fb950" font-size="16" font-family="Verdana" text-anchor="middle" font-weight="bold">Staging</text>
  <text x="365" y="140" fill="#3fb950" font-size="16" font-family="Verdana" text-anchor="middle" font-weight="bold">Area</text>
  <text x="365" y="165" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">git add .</text>

  <!-- Local Repo -->
  <rect x="510" y="80" width="190" height="100" rx="14" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="605" y="120" fill="#f0883e" font-size="16" font-family="Verdana" text-anchor="middle" font-weight="bold">Local</text>
  <text x="605" y="140" fill="#f0883e" font-size="16" font-family="Verdana" text-anchor="middle" font-weight="bold">Repository</text>
  <text x="605" y="165" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">git commit -m "..."</text>

  <!-- Remote Repo -->
  <rect x="750" y="80" width="190" height="100" rx="14" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="845" y="120" fill="#d2a8ff" font-size="16" font-family="Verdana" text-anchor="middle" font-weight="bold">Remote</text>
  <text x="845" y="140" fill="#d2a8ff" font-size="16" font-family="Verdana" text-anchor="middle" font-weight="bold">Repository</text>
  <text x="845" y="165" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">git push origin main</text>

  <!-- Arrows -->
  <line x1="220" y1="130" x2="265" y2="130" stroke="#58a6ff" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="460" y1="130" x2="505" y2="130" stroke="#58a6ff" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="700" y1="130" x2="745" y2="130" stroke="#58a6ff" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="500" y="35" fill="#c9d1d9" font-size="20" font-family="Verdana" text-anchor="middle" font-weight="bold">Git Workflow — Demo</text>
  <text x="500" y="230" fill="#6e7681" font-size="12" font-family="Verdana" text-anchor="middle">Working Directory → Staging Area → Local Repository → Remote Repository</text>
</svg>
