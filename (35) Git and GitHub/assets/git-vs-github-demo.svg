<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="300" fill="#0d1117"/>
  <text x="500" y="35" fill="#c9d1d9" font-size="20" font-family="Verdana" text-anchor="middle" font-weight="bold">Git vs GitHub</text>

  <!-- Git side -->
  <rect x="60" y="70" width="400" height="190" rx="16" fill="#161b22" stroke="#f05032" stroke-width="2"/>
  <circle cx="150" cy="130" r="28" fill="#f05032"/>
  <text x="150" y="138" fill="white" font-size="20" font-family="Verdana" text-anchor="middle" font-weight="bold">Git</text>
  <text x="260" y="120" fill="#f05032" font-size="16" font-family="Verdana" font-weight="bold">Local Tool</text>
  <text x="150" y="185" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">💻 Runs on your machine</text>
  <text x="150" y="205" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">⌨️ Command-line based</text>
  <text x="150" y="225" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">📴 Works fully offline</text>
  <text x="150" y="245" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">📝 Tracks code changes</text>

  <!-- GitHub side -->
  <rect x="540" y="70" width="400" height="190" rx="16" fill="#161b22" stroke="#8957e5" stroke-width="2"/>
  <circle cx="630" cy="130" r="28" fill="#8957e5"/>
  <text x="630" y="138" fill="white" font-size="16" font-family="Verdana" text-anchor="middle" font-weight="bold">Hub</text>
  <text x="740" y="120" fill="#8957e5" font-size="16" font-family="Verdana" font-weight="bold">Cloud Platform</text>
  <text x="630" y="185" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">☁️ Hosts repositories online</text>
  <text x="630" y="205" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">🌐 Web-based interface</text>
  <text x="630" y="225" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">🔀 Pull requests &amp; reviews</text>
  <text x="630" y="245" fill="#8b949e" font-size="12" font-family="Verdana" text-anchor="middle">🤝 Manages collaboration</text>

  <!-- connector -->
  <line x1="460" y1="160" x2="540" y2="160" stroke="#58a6ff" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="500" y="150" fill="#58a6ff" font-size="20" text-anchor="middle" font-family="Verdana">↔</text>
</svg>
