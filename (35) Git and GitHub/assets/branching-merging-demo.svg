<svg viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="1000" height="320" fill="#0d1117"/>
  <text x="500" y="35" fill="#c9d1d9" font-size="20" font-family="Verdana" text-anchor="middle" font-weight="bold">Branching &amp; Merging — Demo</text>

  <!-- main branch line -->
  <line x1="80" y1="150" x2="920" y2="150" stroke="#58a6ff" stroke-width="4"/>
  <text x="45" y="155" fill="#58a6ff" font-size="14" font-family="Verdana" text-anchor="middle" font-weight="bold">main</text>

  <!-- commits on main -->
  <circle cx="150" cy="150" r="9" fill="#58a6ff"/>
  <circle cx="300" cy="150" r="9" fill="#58a6ff"/>
  <circle cx="820" cy="150" r="9" fill="#58a6ff"/>
  <text x="150" y="130" fill="#8b949e" font-size="11" font-family="Verdana" text-anchor="middle">c1</text>
  <text x="300" y="130" fill="#8b949e" font-size="11" font-family="Verdana" text-anchor="middle">c2</text>
  <text x="820" y="130" fill="#8b949e" font-size="11" font-family="Verdana" text-anchor="middle">merge commit</text>

  <!-- feature branch curve -->
  <path d="M300,150 C400,150 400,250 500,250" stroke="#3fb950" stroke-width="4" fill="none"/>
  <path d="M700,250 C800,250 800,150 820,150" stroke="#3fb950" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  <line x1="500" y1="250" x2="700" y2="250" stroke="#3fb950" stroke-width="4"/>
  <text x="600" y="285" fill="#3fb950" font-size="14" font-family="Verdana" text-anchor="middle" font-weight="bold">feature-branch</text>

  <!-- commits on feature -->
  <circle cx="500" cy="250" r="9" fill="#3fb950"/>
  <circle cx="600" cy="250" r="9" fill="#3fb950"/>
  <circle cx="700" cy="250" r="9" fill="#3fb950"/>
  <text x="500" y="272" fill="#8b949e" font-size="11" font-family="Verdana" text-anchor="middle">f1</text>
  <text x="600" y="272" fill="#8b949e" font-size="11" font-family="Verdana" text-anchor="middle">f2</text>
  <text x="700" y="272" fill="#8b949e" font-size="11" font-family="Verdana" text-anchor="middle">f3</text>

  <!-- labels -->
  <rect x="60" y="55" width="230" height="30" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="175" y="75" fill="#c9d1d9" font-size="12" font-family="Verdana" text-anchor="middle">git branch feature-branch</text>

  <rect x="380" y="55" width="230" height="30" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="495" y="75" fill="#c9d1d9" font-size="12" font-family="Verdana" text-anchor="middle">git checkout feature-branch</text>

  <rect x="700" y="55" width="230" height="30" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="815" y="75" fill="#c9d1d9" font-size="12" font-family="Verdana" text-anchor="middle">git merge feature-branch</text>
</svg>
