<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg1)" rx="12"/>

  <!-- Histogram bars (left side) -->
  <g transform="translate(40, 30)">
    <rect x="0"  y="100" width="22" height="50"  fill="#4fc3f7" opacity="0.9" rx="2"/>
    <rect x="26" y="60"  width="22" height="90"  fill="#4fc3f7" opacity="0.9" rx="2"/>
    <rect x="52" y="30"  width="22" height="120" fill="#4fc3f7" opacity="0.9" rx="2"/>
    <rect x="78" y="50"  width="22" height="100" fill="#4fc3f7" opacity="0.9" rx="2"/>
    <rect x="104" y="80" width="22" height="70"  fill="#4fc3f7" opacity="0.9" rx="2"/>
    <rect x="130" y="110" width="22" height="40" fill="#4fc3f7" opacity="0.9" rx="2"/>
    <!-- Axis -->
    <line x1="0" y1="152" x2="160" y2="152" stroke="#ffffff40" stroke-width="1"/>
    <!-- axvline -->
    <line x1="75" y1="20" x2="75" y2="152" stroke="#ff4757" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="77" y="18" fill="#ff4757" font-size="9">pass</text>
    <text x="0" y="170" fill="#aaaaaa" font-size="10">Histogram</text>
  </g>

  <!-- Box Plot (middle-left) -->
  <g transform="translate(230, 50)">
    <!-- whisker lines -->
    <line x1="60" y1="25"  x2="60"  y2="45"  stroke="#81c784" stroke-width="2"/>
    <line x1="60" y1="95"  x2="60"  y2="115" stroke="#81c784" stroke-width="2"/>
    <line x1="40" y1="25"  x2="80"  y2="25"  stroke="#81c784" stroke-width="2"/>
    <line x1="40" y1="115" x2="80"  y2="115" stroke="#81c784" stroke-width="2"/>
    <!-- box -->
    <rect x="30" y="45" width="60" height="50" fill="none" stroke="#81c784" stroke-width="2" rx="2"/>
    <!-- median line -->
    <line x1="30" y1="70" x2="90" y2="70" stroke="#ffeb3b" stroke-width="2.5"/>
    <!-- mean dot -->
    <circle cx="60" cy="65" r="3" fill="#ff7043"/>
    <!-- outlier -->
    <circle cx="60" cy="130" r="3" fill="#81c784" opacity="0.7"/>
    <!-- labels -->
    <text x="0"  y="73"  fill="#aaaaaa" font-size="8">Q1</text>
    <text x="93" y="73"  fill="#aaaaaa" font-size="8">Q3</text>
    <text x="35" y="68"  fill="#ffeb3b" font-size="7">Med</text>
    <text x="15" y="150" fill="#aaaaaa" font-size="10">Box Plot</text>
  </g>

  <!-- Title text -->
  <text x="400" y="75" fill="#ffffff" font-size="26" font-weight="bold" text-anchor="middle">📊 Data Visualization</text>
  <text x="400" y="105" fill="#4fc3f7" font-size="18" text-anchor="middle">Part 2 — Statistical Charts</text>
  <text x="400" y="135" fill="#aaaaaa" font-size="13" text-anchor="middle">Histograms · Box Plots · axvline · Outlier Detection</text>

  <!-- Badge row -->
  <rect x="330" y="150" width="80" height="22" fill="#306998" rx="4"/>
  <text x="370" y="165" fill="white" font-size="11" text-anchor="middle">Python 3</text>
  <rect x="420" y="150" width="100" height="22" fill="#c0420a" rx="4"/>
  <text x="470" y="165" fill="white" font-size="11" text-anchor="middle">Matplotlib</text>
  <rect x="530" y="150" width="80" height="22" fill="#013243" rx="4"/>
  <text x="570" y="165" fill="white" font-size="11" text-anchor="middle">NumPy</text>

  <!-- Overlapping histogram (right) -->
  <g transform="translate(650, 30)">
    <rect x="0"  y="80"  width="18" height="70"  fill="#ef5350" opacity="0.8" rx="2"/>
    <rect x="20" y="40"  width="18" height="110" fill="#ef5350" opacity="0.8" rx="2"/>
    <rect x="40" y="60"  width="18" height="90"  fill="#ef5350" opacity="0.8" rx="2"/>
    <rect x="0"  y="90"  width="18" height="60"  fill="#66bb6a" opacity="0.5" rx="2"/>
    <rect x="20" y="100" width="18" height="50"  fill="#66bb6a" opacity="0.5" rx="2"/>
    <rect x="40" y="70"  width="18" height="80"  fill="#66bb6a" opacity="0.5" rx="2"/>
    <line x1="0" y1="152" x2="70" y2="152" stroke="#ffffff40" stroke-width="1"/>
    <text x="0" y="170" fill="#aaaaaa" font-size="10">Overlap</text>
  </g>
</svg>
