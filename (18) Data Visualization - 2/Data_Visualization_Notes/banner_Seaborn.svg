<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f"/>
      <stop offset="100%" style="stop-color:#112240"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg3)" rx="12"/>

  <!-- Scatter Plot (left) -->
  <g transform="translate(25, 25)">
    <text x="30" y="12" fill="#4c72b0" font-size="10" font-weight="bold">Scatter</text>
    <!-- dots smoker=no (blue) -->
    <circle cx="20" cy="90" r="4" fill="#4c72b0" opacity="0.8"/>
    <circle cx="45" cy="70" r="5" fill="#4c72b0" opacity="0.8"/>
    <circle cx="70" cy="55" r="4" fill="#4c72b0" opacity="0.8"/>
    <circle cx="90" cy="45" r="6" fill="#4c72b0" opacity="0.8"/>
    <circle cx="110" cy="35" r="4" fill="#4c72b0" opacity="0.8"/>
    <!-- dots smoker=yes (orange) -->
    <circle cx="30" cy="80" r="4" fill="#dd8452" opacity="0.8"/>
    <circle cx="55" cy="95" r="5" fill="#dd8452" opacity="0.8"/>
    <circle cx="75" cy="65" r="3" fill="#dd8452" opacity="0.8"/>
    <circle cx="100" cy="75" r="5" fill="#dd8452" opacity="0.8"/>
    <!-- axes -->
    <line x1="10" y1="108" x2="125" y2="108" stroke="#ffffff30" stroke-width="1"/>
    <line x1="10" y1="20"  x2="10"  y2="108" stroke="#ffffff30" stroke-width="1"/>
    <!-- legend -->
    <circle cx="15" cy="125" r="3" fill="#4c72b0"/>
    <text x="21" y="128" fill="#aaaaaa" font-size="8">No</text>
    <circle cx="45" cy="125" r="3" fill="#dd8452"/>
    <text x="51" y="128" fill="#aaaaaa" font-size="8">Yes</text>
    <text x="20" y="145" fill="#aaaaaa" font-size="9">tips dataset</text>
  </g>

  <!-- Heatmap (middle-left) -->
  <g transform="translate(175, 20)">
    <text x="20" y="12" fill="#c44e52" font-size="10" font-weight="bold">Heatmap</text>
    <!-- 4x4 heatmap cells -->
    <rect x="0"  y="18" width="22" height="18" fill="#3b82c4" rx="1"/>
    <rect x="23" y="18" width="22" height="18" fill="#6ba3d6" rx="1"/>
    <rect x="46" y="18" width="22" height="18" fill="#c44e52" rx="1"/>
    <rect x="69" y="18" width="22" height="18" fill="#e0877a" rx="1"/>

    <rect x="0"  y="38" width="22" height="18" fill="#6ba3d6" rx="1"/>
    <rect x="23" y="38" width="22" height="18" fill="#c44e52" rx="1"/>
    <rect x="46" y="38" width="22" height="18" fill="#e0877a" rx="1"/>
    <rect x="69" y="38" width="22" height="18" fill="#3b82c4" rx="1"/>

    <rect x="0"  y="58" width="22" height="18" fill="#c44e52" rx="1"/>
    <rect x="23" y="58" width="22" height="18" fill="#3b82c4" rx="1"/>
    <rect x="46" y="58" width="22" height="18" fill="#6ba3d6" rx="1"/>
    <rect x="69" y="58" width="22" height="18" fill="#c44e52" rx="1"/>

    <rect x="0"  y="78" width="22" height="18" fill="#e0877a" rx="1"/>
    <rect x="23" y="78" width="22" height="18" fill="#6ba3d6" rx="1"/>
    <rect x="46" y="78" width="22" height="18" fill="#3b82c4" rx="1"/>
    <rect x="69" y="78" width="22" height="18" fill="#e0877a" rx="1"/>

    <!-- annotation sample -->
    <text x="6"  y="30" fill="white" font-size="6">112</text>
    <text x="29" y="30" fill="white" font-size="6">149</text>
    <text x="52" y="30" fill="white" font-size="6">178</text>
    <text x="75" y="30" fill="white" font-size="6">199</text>
    <!-- color bar -->
    <defs>
      <linearGradient id="cbar" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   style="stop-color:#3b82c4"/>
        <stop offset="100%" style="stop-color:#c44e52"/>
      </linearGradient>
    </defs>
    <rect x="0" y="105" width="91" height="8" fill="url(#cbar)" rx="2"/>
    <text x="0"   y="122" fill="#aaaaaa" font-size="8">cool</text>
    <text x="65"  y="122" fill="#aaaaaa" font-size="8">warm</text>
    <text x="10"  y="140" fill="#aaaaaa" font-size="9">flights pivot</text>
  </g>

  <!-- Main Title -->
  <text x="530" y="65"  fill="#ffffff" font-size="30" font-weight="bold" text-anchor="middle">🌊 Seaborn</text>
  <text x="530" y="95"  fill="#4c72b0" font-size="17" text-anchor="middle">Statistical Data Visualization</text>
  <text x="530" y="120" fill="#aaaaaa" font-size="11" text-anchor="middle">Relational · Categorical · Distribution · Matrix</text>

  <!-- Badges -->
  <rect x="415" y="138" width="80"  height="22" fill="#306998" rx="4"/>
  <text x="455" y="153" fill="white" font-size="11" text-anchor="middle">Python 3</text>
  <rect x="505" y="138" width="80"  height="22" fill="#4c72b0" rx="4"/>
  <text x="545" y="153" fill="white" font-size="11" text-anchor="middle">Seaborn</text>
  <rect x="595" y="138" width="100" height="22" fill="#c0420a" rx="4"/>
  <text x="645" y="153" fill="white" font-size="11" text-anchor="middle">Matplotlib</text>

  <!-- Histogram bar chart (right) -->
  <g transform="translate(665, 25)">
    <text x="10" y="12" fill="#55a868" font-size="10" font-weight="bold">Histogram</text>
    <rect x="0"  y="100" width="14" height="25"  fill="#55a868" opacity="0.8" rx="1"/>
    <rect x="16" y="75"  width="14" height="50"  fill="#55a868" opacity="0.8" rx="1"/>
    <rect x="32" y="50"  width="14" height="75"  fill="#55a868" opacity="0.8" rx="1"/>
    <rect x="48" y="65"  width="14" height="60"  fill="#55a868" opacity="0.8" rx="1"/>
    <rect x="64" y="90"  width="14" height="35"  fill="#55a868" opacity="0.8" rx="1"/>
    <rect x="80" y="105" width="14" height="20"  fill="#55a868" opacity="0.8" rx="1"/>
    <line x1="0" y1="128" x2="98" y2="128" stroke="#ffffff30" stroke-width="1"/>
    <text x="8" y="145" fill="#aaaaaa" font-size="9">penguins</text>
  </g>
</svg>
