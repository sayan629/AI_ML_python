<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <rect width="600" height="320" fill="#0d1117" rx="12"/>

  <!-- Grid lines -->
  <line x1="60" y1="260" x2="540" y2="260" stroke="#30363d" stroke-width="1"/>
  <line x1="60" y1="200" x2="540" y2="200" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="140" x2="540" y2="140" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="80"  x2="540" y2="80"  stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Bell curve (smooth path) -->
  <path d="M60,258
    C90,257 120,252 150,240
    C180,228 200,200 220,170
    C235,148 245,118 260,95
    C270,78  280,68  300,65
    C320,68  330,78  340,95
    C355,118 365,148 380,170
    C400,200 420,228 450,240
    C480,252 510,257 540,258"
    fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Fill under curve -->
  <path d="M60,258
    C90,257 120,252 150,240
    C180,228 200,200 220,170
    C235,148 245,118 260,95
    C270,78  280,68  300,65
    C320,68  330,78  340,95
    C355,118 365,148 380,170
    C400,200 420,228 450,240
    C480,252 510,257 540,258 Z"
    fill="url(#blueGrad)" opacity="0.15"/>

  <!-- σ region fills -->
  <!-- -1σ to +1σ (68%) -->
  <path d="M220,170 C235,148 245,118 260,95 C270,78 280,68 300,65
           C320,68 330,78 340,95 C355,118 365,148 380,170 L380,258 L220,258 Z"
        fill="#58a6ff" opacity="0.25"/>
  <!-- -2σ to -1σ -->
  <path d="M150,240 C180,228 200,200 220,170 L220,258 L150,258 Z"
        fill="#58a6ff" opacity="0.12"/>
  <!-- +1σ to +2σ -->
  <path d="M380,170 C400,200 420,228 450,240 L450,258 L380,258 Z"
        fill="#58a6ff" opacity="0.12"/>

  <!-- Vertical lines at μ, ±1σ, ±2σ -->
  <line x1="300" y1="65"  x2="300" y2="260" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="220" y1="170" x2="220" y2="260" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="380" y1="170" x2="380" y2="260" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="150" y1="240" x2="150" y2="260" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="240" x2="450" y2="260" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- X-axis labels -->
  <text x="150" y="278" text-anchor="middle" fill="#8b949e" font-size="13" font-family="monospace">-2σ</text>
  <text x="220" y="278" text-anchor="middle" fill="#58a6ff" font-size="13" font-family="monospace">-1σ</text>
  <text x="300" y="278" text-anchor="middle" fill="#e3b341" font-size="14" font-family="monospace" font-weight="bold">μ</text>
  <text x="380" y="278" text-anchor="middle" fill="#58a6ff" font-size="13" font-family="monospace">+1σ</text>
  <text x="450" y="278" text-anchor="middle" fill="#8b949e" font-size="13" font-family="monospace">+2σ</text>

  <!-- Percentage annotations -->
  <text x="300" y="175" text-anchor="middle" fill="#58a6ff" font-size="13" font-family="sans-serif" font-weight="bold">68.2%</text>
  <text x="185" y="220" text-anchor="middle" fill="#8b949e" font-size="11" font-family="sans-serif">13.6%</text>
  <text x="415" y="220" text-anchor="middle" fill="#8b949e" font-size="11" font-family="sans-serif">13.6%</text>

  <!-- Brace for 68% -->
  <line x1="220" y1="295" x2="380" y2="295" stroke="#58a6ff" stroke-width="1.2"/>
  <line x1="220" y1="290" x2="220" y2="300" stroke="#58a6ff" stroke-width="1.2"/>
  <line x1="380" y1="290" x2="380" y2="300" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="300" y="312" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="sans-serif">68%</text>

  <!-- Title -->
  <text x="300" y="38" text-anchor="middle" fill="#c9d1d9" font-size="15" font-family="sans-serif" font-weight="bold">Standard Deviation — Normal Distribution</text>

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
