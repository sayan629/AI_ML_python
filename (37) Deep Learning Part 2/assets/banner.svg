<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c9ff"/>
      <stop offset="100%" stop-color="#92fe9d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8e2de2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8e2de2" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <circle cx="1000" cy="90" r="220" fill="url(#glow)"/>
  <circle cx="150" cy="230" r="180" fill="url(#glow)"/>

  <!-- decorative neural network -->
  <g stroke="#5ad1ff" stroke-width="1.4" opacity="0.55">
    <line x1="930" y1="70" x2="1020" y2="110"/>
    <line x1="930" y1="70" x2="1020" y2="150"/>
    <line x1="930" y1="70" x2="1020" y2="190"/>
    <line x1="930" y1="130" x2="1020" y2="110"/>
    <line x1="930" y1="130" x2="1020" y2="150"/>
    <line x1="930" y1="130" x2="1020" y2="190"/>
    <line x1="930" y1="190" x2="1020" y2="110"/>
    <line x1="930" y1="190" x2="1020" y2="150"/>
    <line x1="930" y1="190" x2="1020" y2="190"/>
    <line x1="1020" y1="110" x2="1100" y2="130"/>
    <line x1="1020" y1="150" x2="1100" y2="130"/>
    <line x1="1020" y1="190" x2="1100" y2="130"/>
    <line x1="1020" y1="110" x2="1100" y2="170"/>
    <line x1="1020" y1="150" x2="1100" y2="170"/>
    <line x1="1020" y1="190" x2="1100" y2="170"/>
  </g>
  <g fill="#92fe9d">
    <circle cx="930" cy="70" r="6"/>
    <circle cx="930" cy="130" r="6"/>
    <circle cx="930" cy="190" r="6"/>
    <circle cx="1020" cy="110" r="6" fill="#00c9ff"/>
    <circle cx="1020" cy="150" r="6" fill="#00c9ff"/>
    <circle cx="1020" cy="190" r="6" fill="#00c9ff"/>
    <circle cx="1100" cy="130" r="6" fill="#ffd166"/>
    <circle cx="1100" cy="170" r="6" fill="#ffd166"/>
  </g>

  <!-- text -->
  <text x="70" y="120" font-family="Segoe UI, Verdana, sans-serif" font-size="58" font-weight="700" fill="#ffffff" filter="url(#softGlow)">
    🧠 Deep Learning
  </text>
  <text x="70" y="175" font-family="Segoe UI, Verdana, sans-serif" font-size="42" font-weight="700" fill="url(#accent)">
    Part — 2
  </text>
  <text x="72" y="220" font-family="Segoe UI, Verdana, sans-serif" font-size="20" fill="#c9c9e8">
    Forward / Backward Propagation • Loss Functions • Optimizers • Adam
  </text>

  <rect x="70" y="240" width="480" height="4" rx="2" fill="url(#accent)"/>
</svg>
